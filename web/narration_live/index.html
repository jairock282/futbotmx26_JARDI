<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FutBotMX-JARDI</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="score-band">
        <div>
          <h1>FutBotMX - JARDI</h1>
        </div>
        <div class="status-panel">
          <div class="status-dot" id="connectionDot"></div>
          <span id="connectionText">Conectando</span>
        </div>
      </section>

      <section class="control-strip" aria-label="Controles">
        <button class="primary" id="pipelineButton" type="button">
          <span class="icon">▶</span>
          <span>Iniciar Pipeline</span>
        </button>
        <button id="audioButton" type="button">
          <span class="icon">♪</span>
          <span>Audio</span>
        </button>
        <button id="demoButton" type="button">
          <span class="icon">●</span>
          <span>Demo</span>
        </button>
        <button id="resetButton" type="button">
          <span class="icon">↺</span>
          <span>Limpiar</span>
        </button>
        <div class="meter" aria-label="Cola de audio">
          <span>Cola</span>
          <strong id="queueCount">0</strong>
        </div>
      </section>

      <section class="scoreboard" aria-label="Marcador">
        <div class="scoreboard-team team-a">
          <span class="scoreboard-label">Robot A</span>
          <span class="scoreboard-goals" id="scoreA">0</span>
        </div>
        <div class="scoreboard-separator">
          <span class="scoreboard-vs">VS</span>
        </div>
        <div class="scoreboard-team team-b">
          <span class="scoreboard-goals" id="scoreB">0</span>
          <span class="scoreboard-label">Robot B</span>
        </div>
      </section>

      <section class="video-feed" aria-label="Video pipeline" id="videoSection">
        <div class="video-header">
          <h2>Vision Pipeline</h2>
          <span class="pipeline-status" id="pipelineStatus">Detenido</span>
        </div>
        <div class="video-container">
          <img id="videoFeed" src="" alt="Pipeline video feed">
          <p class="video-placeholder" id="videoPlaceholder">Presiona "Iniciar Pipeline" para comenzar</p>
        </div>
      </section>

      <section class="audio-console" aria-label="Reproductor">
        <div>
          <strong id="playerStatus">Audio listo</strong>
          <span id="playerHint">Activa Audio antes de iniciar la demo.</span>
        </div>
        <audio id="audioPlayer" controls preload="none"></audio>
      </section>

      <section class="narrator-booth" aria-label="Narrador">
        <div class="dialogue-canvas">
          <span class="dialogue-tag" id="liveType">Esperando</span>
          <strong class="dialogue-text" id="liveText">Sin acciones</strong>
        </div>
        <div class="narrator-avatar">
          <img src="/assets/comentarista.png" alt="Robot comentarista">
        </div>
      </section>

      <section class="timeline" aria-label="Acciones">
        <div class="timeline-head">
          <h2>Acciones</h2>
          <span id="actionCount">0</span>
        </div>
        <div class="event-list" id="eventList"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
